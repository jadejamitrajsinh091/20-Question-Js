  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <title>Time Machine - Leap Year Checker</title>
</head>
<body>

  <div class="orbit-container">
    <div class="orbit orbit1"></div>
    <div class="orbit orbit2"></div>
    <div class="orbit-center"></div>
  </div>

  <form id="myForm">
    <h2 class="title">TIME NAVIGATOR</h2>
    <p class="subtitle">Leap Year Analyzer</p>

    <div class="input-group">
      <input type="number" id="year" placeholder="Enter Year (e.g. 2024)">
    </div>

    <button type="button" id="btn" onclick="check()">CHECK TIMELINE</button>

    <h3 id="result"></h3>
  </form>

</body>
