  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vowel & Consonant Scanner</title>
</head>
<body>

  <div class="bg-letters">
    <span class="l1">A</span>
    <span class="l2">Z</span>
    <span class="l3">E</span>
  </div>

  <form id="myForm">
    <h2 class="title">LETTER SCANNER</h2>
    <p class="subtitle">Vowel / Consonant Detector</p>

    <div class="input-group">
      <input type="text" id="letter" placeholder="Enter Any Letter" maxlength="1" autocomplete="off">
    </div>

    <button type="button" id="btn" onclick="check()">SCAN LETTER</button>

    <h3 id="result"></h3>
  </form>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
