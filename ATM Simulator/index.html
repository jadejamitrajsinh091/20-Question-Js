  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATM Withdrawal</title>
</head>
<body>

  <div class="bank-bg">
    <span>₹</span>
    <span>$</span>
    <span>€</span>
    <span>¥</span>
  </div>

  <form id="myForm">
    <div class="atm-header">
      <h2>🏦 GLOBAL BANK</h2>
      <p>CASH DISPENSER UNIT</p>
    </div>

    <div class="input-group">
      <input type="number" id="amount" placeholder="Enter Amount (₹)" autocomplete="off">
    </div>

    <button type="button" id="btn" onclick="withdraw()">WITHDRAW CASH</button>

    <div id="result"></div>
  </form>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
