  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discount Calculator</title>
</head>
<body>

  <div class="shop-bg">
    <span>🛒</span>
    <span>🛍️</span>
    <span>🏷️</span>
    <span>🎁</span>
  </div>

  <form id="myForm">
    <div class="shop-header">
      <h2>MEGA SALE 🏷️</h2>
      <p>DISCOUNT CALCULATOR</p>
    </div>

    <div class="input-group">
      <input type="number" id="amount" placeholder="Enter Bill Amount (₹)" autocomplete="off">
    </div>

    <button type="button" id="btn" onclick="calculate()">APPLY DISCOUNT</button>

    <div id="result"></div>
  </form>

</body>

    <script  src="./script.js"></script>

  </body>
