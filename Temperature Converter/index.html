  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thermal Converter</title>
</head>
<body>

  <div class="thermal-bg"></div>

  <form id="myForm">
    <div class="header">
      <h2>🌡️ THERMAL ENGINE</h2>
      <p>CELSIUS ↔ FAHRENHEIT</p>
    </div>

    <div class="input-group">
      <input type="number" id="temp" placeholder="Enter Temperature" autocomplete="off">
    </div>

    <div class="button-group">
      <button type="button" class="btn-hot" onclick="toFahrenheit()">Convert to °F (Fahrenheit)</button>
      <button type="button" class="btn-cold" onclick="toCelsius()">Convert to °C (Celsius)</button>
    </div>

    <div id="result"></div>
  </form>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
