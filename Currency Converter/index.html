  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Forex Converter</title>
</head>
<body>

  <div class="forex-bg">
    <span>₹</span>
    <span>$</span>
    <span>€</span>
    <span>£</span>
  </div>

  <form id="myForm">
    <div class="header">
      <h2>💱 FOREX EXCHANGE</h2>
      <p>GLOBAL CURRENCY CONVERTER</p>
    </div>

    <div class="input-group">
      <input type="number" id="amount" placeholder="Enter Amount" autocomplete="off">
    </div>

    <div class="button-group">
      <button type="button" class="btn-usd" onclick="toUSD()">Convert to USD ($)</button>
      <button type="button" class="btn-inr" onclick="toINR()">Convert to INR (₹)</button>
    </div>

    <div id="result"></div>
  </form>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
