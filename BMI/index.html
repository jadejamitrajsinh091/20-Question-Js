  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Health Scanner</title>
</head>
<body>

  <div class="health-bg">
    <span>🏋️‍♂️</span>
    <span>❤️</span>
    <span>🏃‍♂️</span>
    <span>🍏</span>
  </div>

  <form id="myForm">
    <div class="header">
      <h2>🩺 HEALTH MONITOR</h2>
      <p>BODY MASS INDEX SCANNER</p>
    </div>

    <div class="input-group">
      <input type="number" id="weight" placeholder="Enter Weight (kg)" autocomplete="off">
    </div>

    <div class="input-group">
      <input type="number" id="height" placeholder="Enter Height (cm)" autocomplete="off">
    </div>

    <button type="button" id="btn" onclick="calculateBMI()">SCAN BODY MASS</button>

    <div id="result"></div>
  </form>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
